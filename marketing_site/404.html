<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>404 - ServoERP</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #0b1f47;
        color: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 18% 18%, rgba(37, 99, 235, 0.45), transparent 30%),
          linear-gradient(135deg, #071634 0%, #0b1f47 48%, #123d88 100%);
      }

      main {
        width: min(92vw, 620px);
        padding: 44px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      }

      .code {
        margin: 0 0 8px;
        color: #f97316;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: #08163d;
        font-size: clamp(36px, 7vw, 64px);
        line-height: 1;
      }

      p {
        margin: 18px 0 0;
        color: #475569;
        font-size: 17px;
        line-height: 1.6;
      }

      .brand {
        margin-top: 28px;
        padding-top: 20px;
        border-top: 1px solid #dbe3ef;
        color: #0b2f72;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="code">404</p>
      <h1>Page not found</h1>
      <p>
        ServoERP is being updated. The site will be available again after the
        final release page is complete.
      </p>
      <div class="brand">ServoERP</div>
    </main>
  </body>
</html>
