<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ServoERP Download Unavailable</title>
    <meta name="description" content="ServoERP downloads are not available directly from the website." />
    <style>
      :root {
        --ink: #071b4f;
        --text: #13234a;
        --muted: #5f6f8f;
        --line: #dbe5f4;
        --blue: #075eea;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--text);
        background: #f6f9fe;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      main {
        width: min(620px, 100%);
        padding: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 20px 56px rgba(7, 27, 79, 0.12);
      }

      h1 {
        margin: 0 0 10px;
        color: var(--ink);
        font-size: 32px;
        line-height: 1.1;
      }

      p {
        margin: 0 0 22px;
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 22px;
        border-radius: 8px;
        color: #ffffff;
        background: var(--blue);
        font-weight: 850;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Download not available</h1>
      <p>
        ServoERP installer access is handled after demo and licensing confirmation.
        Please contact the ServoERP team for setup or client update support.
      </p>
      <a href="../index.html#contact">Contact ServoERP</a>
    </main>
  </body>
</html>
